# 固定发信邮箱配置。所有宿舍共用这个邮箱发送通知。
email:
  enabled: true
  smtp_server: "smtp.163.com"
  smtp_port: 465
  use_ssl: true
  sender_email: "your_email@163.com"
  sender_password: "your_email_auth_code"
  send_retries: 2
  retry_delay_seconds: 3

# Token 池和宿舍清单单独维护，避免主配置文件过长。
# 实际使用时建议复制为 tokens.yaml / rooms.csv，并在 .gitignore 中保留忽略规则。
tokens_file: "tokens.example.yaml"
rooms_file: "rooms.example.csv"

# 电量检测调度。建议用 cron 每分钟或每几分钟执行一次 `python3 main.py --check`。
check:
  default_interval_minutes: 240  # 每个宿舍默认 4 小时检查一次
  batch_size: 20                 # 每次脚本最多检查多少个到期宿舍
  request_interval_seconds: 3    # 两次请求之间的间隔
  jitter_seconds: 60             # 下次检查时间随机抖动，避免请求扎堆
  retry_delay_minutes: 30        # 查询失败后的重试间隔
  test_email_token_wait_seconds: 60  # 批量测试邮件等待 token 可用的最长秒数

# 通知调度。建议用 cron 单独执行 `python3 main.py --notify`。
notify:
  low_power_threshold: 5.0
  max_alert_count: 3
  max_error_alert_count: 3
  daily_report_hour: 8
  send_batch_size: 50
  retry_delay_minutes: 15
  max_send_attempts: 3
  history_days: 14
  average_days: 3

